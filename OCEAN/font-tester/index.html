<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Testador Source Code Pro</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="tester-container">


    <h3 class="label">OCEAN</h3>

    <div class="preview-card">
      <div class="preview-text" id="previewText">Source Code Pro</div>
      <div class="preview-info">
        <span>Source Code Pro – Black</span>
		  
		  <!-- Informació optativa -->
        <span class="price">$180 <span class="plus">+</span></span>
      </div>
    </div>
        <div class="input-wrapper">
      <input type="text" id="textInput" placeholder="Type your text here" />
            <br>
      <div class="controls">
        <span id="fontSizeValue">55px</span>
        <input type="range" id="fontSizeSlider" min="12" max="120" value="55" />
        <button id="clearBtn">&times;</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
